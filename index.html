<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秋秋次元</title>

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="style.css">

    <!-- Vercel Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
</head>


<body>
    <!-- 导航栏 -->
    <header class="navbar">
        <div class="logo">
            <h1>
                <a href="#" title="秋秋次元">秋秋次元首页</a>
            </h1>
        </div>
        <div class="navbaraction">
            <button class="btn" id="love">💖 我的收藏</button>
            <button class="btn" id="dark">🌓 主题切换</button>
        </div>
    </header>

    <!-- 轮播图 -->
    <!-- section是有主题的区块 -->
    <!-- 先用三个slide占位，后续js补上 -->
    <!-- carousel是轮播图区域最外层容器，all-slides是轨道，slide是占位的静态页面 
     用img不用bg是在html时就可以加载出来  caption是文字说明-->
    <section class="carousel">
        <div class="all-slides">
            <div class="slide1 slide">
                <img src="image/1.webp" alt="">
                <div class="caption">孤独摇滚</div>
            </div>
            <div class="slide2 slide">
                <img src="image/2.jpg" alt="">
                <div class="caption">你的名字</div>
            </div>
            <div class="slide3 slide">
                <img src="image/3.jpeg" alt="">
                <div class="caption">夏洛特</div>
            </div>
        </div>

        <button class="carousel-btn prev">&#10094;</button>
        <button class="carousel-btn next">&#10095;</button>

        <div class="dots">
            <div class="dot dot1"></div>
            <div class="dot dot2"></div>
            <div class="dot dot3"></div>
        </div>
    </section>



    <div class="container">
        <!-- 侧边栏 -->
        <div class="controls">
            <aside class="search control">
                <label for="search">搜索动漫</label>
                <input type="search" id="search" placeholder="请输入关键字...">
            </aside>

            <aside class="select control">
                <label for="sort">推荐 (排序仅支持搜索前内容)</label>
                <select id="sort">
                    <option value="default" selected>默认推荐</option>
                    <option value="score-sort">评分从高到低</option>
                </select>
            </aside>
        </div>

        <!-- 主题内容 -->
        <main>
            <div class="content">
                <h2 id="title-text">搜索结果</h2>
                <br>
            </div>

            <div class="cards">
            </div>
        </main>


    </div>

    <!-- 详情页弹窗 -->
    <div class="modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal">&times;</button>
            <div id="modal-body">
                <h2>动漫标题</h2>
                <p><strong>开播:</strong> 2026-04</p>
                <p><strong>原名:</strong> Example</p>
                <hr>
                <p>动漫简介……</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
